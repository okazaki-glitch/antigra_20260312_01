<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI三目並べ</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Tic Tac Toe</h1>
            <p class="subtitle">vs AI (Minimax)</p>
        </header>

        <main>
            <div class="status-board">
                <div class="player-indicator px-turn active">
                    <span class="icon">✖</span>
                    <span class="name">Player</span>
                </div>
                <div class="player-indicator po-turn">
                    <span class="icon">〇</span>
                    <span class="name">AI</span>
                </div>
            </div>

            <div class="game-board" id="board">
                <div class="cell" data-index="0"></div>
                <div class="cell" data-index="1"></div>
                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="message-container">
                <p id="message">Your turn!</p>
            </div>

            <button id="reset-btn" class="reset-btn">
                <span>Restart Game</span>
            </button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
